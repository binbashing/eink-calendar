services:
  calendar-app:
    build: .
    ports:
      - "3000:3000"
      - "4001:4001"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    volumes:
      - ./:/app
      - /app/node_modules
      - renders:/renders
      - app_data:/app/data
volumes:
  renders:
  app_data: